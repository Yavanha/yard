---
devtools_prefix: /opt/devtools
workspace_root: /home/ubuntu/workspaces
vm_user: ubuntu
docker_users:
  - ubuntu
devcontainer_cli_version: "0.80.2"
supabase_cli_enabled: false
supabase_cli_version: "2.98.2"
devctl_cache_dir: /var/cache/devctl
hidepid_enabled: true
docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
supabase_cli_arch_map:
  x86_64: amd64
  aarch64: arm64

name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check
        run: ./scripts/check.sh
